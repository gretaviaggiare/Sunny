name: Build SunnyCars App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pdfplumber pandas openpyxl

      # 🔹 BUILD WINDOWS
      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name SunnyCars-win pdf_to_excel_app.py

      # 🔹 BUILD MAC
      - name: Build Mac
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name SunnyCars-mac pdf_to_excel_app.py

      # 🔹 CREA DMG (solo Mac)
      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          mkdir dmg
          cp dist/SunnyCars-mac dmg/
          hdiutil create -volname SunnyCars -srcfolder dmg -ov -format UDZO SunnyCars.dmg

      # 🔹 UPLOAD SU RELEASE
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            SunnyCars.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}