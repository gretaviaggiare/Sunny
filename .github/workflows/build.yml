name: Build SunnyCars App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pdfplumber pandas openpyxl

      # 🔹 BUILD WINDOWS (.exe con icona + template)
      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed ^
            --name SunnyCars ^
            --icon=Icon.ico ^
            --add-data "import prenotazioni_MASTER - ALL INCLUSIVE PRODUCT SUNNY CARS.xlsx;." ^
            pdf_to_excel_app.py

      # 🔹 BUILD MAC (.app con icona + template)
      - name: Build Mac App
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed \
            --name SunnyCars \
            --icon=icon.icns \
            --add-data "import prenotazioni_MASTER - ALL INCLUSIVE PRODUCT SUNNY CARS.xlsx:." \
            pdf_to_excel_app.py

      # 🔹 CREA DMG INSTALLABILE (drag & drop)
      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          mkdir dmg
          cp -R dist/SunnyCars.app dmg/
          ln -s /Applications dmg/Applications

          hdiutil create -volname "SunnyCars" \
            -srcfolder dmg \
            -ov -format UDZO SunnyCars.dmg

      # 🔹 UPLOAD SU RELEASE
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            SunnyCars.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}